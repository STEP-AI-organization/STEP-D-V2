# Explicit project name: the repo folder name is non-ASCII (Korean), which makes
# Compose derive an empty project name and fail ("project name must not be empty").
name: ai-shorts

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ai-shorts-api:local
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-shorts}:${POSTGRES_PASSWORD:-shorts}@postgres:5432/${POSTGRES_DB:-shorts}
      STORAGE_DIR: /data
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8010}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TRANSCRIBE_MODEL: ${OPENAI_TRANSCRIBE_MODEL:-whisper-1}
      OPENAI_TRANSCRIBE_LANGUAGE: ${OPENAI_TRANSCRIBE_LANGUAGE:-ko}
      OPENAI_TRANSCRIBE_PROMPT: ${OPENAI_TRANSCRIBE_PROMPT:-Korean broadcast, variety show, interview, and talk show footage. Preserve proper nouns and casual speech as spoken.}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GEMINI_MAX_EVAL_CANDIDATES: ${GEMINI_MAX_EVAL_CANDIDATES:-12}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-2048}
      MAX_CANDIDATE_COUNT: ${MAX_CANDIDATE_COUNT:-30}
      FINAL_CLIP_COUNT: ${FINAL_CLIP_COUNT:-8}
      MIN_CLIP_SECONDS: ${MIN_CLIP_SECONDS:-20}
      MAX_CLIP_SECONDS: ${MAX_CLIP_SECONDS:-90}
      TARGET_CLIP_SECONDS: ${TARGET_CLIP_SECONDS:-45}
      BOUNDARY_REFINE_ENABLED: ${BOUNDARY_REFINE_ENABLED:-true}
      BOUNDARY_MAX_SECONDS: ${BOUNDARY_MAX_SECONDS:-70}
      FFMPEG_AUDIO_FILTER: ${FFMPEG_AUDIO_FILTER:-loudnorm=I=-16:TP=-1.5:LRA=11,highpass=f=80,lowpass=f=12000}
      RENDER_VERTICAL_SHORTS: ${RENDER_VERTICAL_SHORTS:-true}
      SHORTS_REFRAME_MODE: ${SHORTS_REFRAME_MODE:-blur}
      SHORTS_WIDTH: ${SHORTS_WIDTH:-1080}
      SHORTS_HEIGHT: ${SHORTS_HEIGHT:-1920}
      SHORTS_BACKGROUND_COLOR: ${SHORTS_BACKGROUND_COLOR:-black}
      SHORTS_BLUR_BACKGROUND_STRENGTH: ${SHORTS_BLUR_BACKGROUND_STRENGTH:-24}
      SHORTS_SUBTITLES_ENABLED: ${SHORTS_SUBTITLES_ENABLED:-true}
      SHORTS_STYLE_PRESET_DEFAULT: ${SHORTS_STYLE_PRESET_DEFAULT:-korean_pop}
      SHORTS_SUBTITLE_MODE_DEFAULT: ${SHORTS_SUBTITLE_MODE_DEFAULT:-auto}
      SHORTS_SUBTITLE_FONT_NAME: ${SHORTS_SUBTITLE_FONT_NAME:-G마켓 산스 TTF Bold}
      SHORTS_SUBTITLE_FONTS_DIR: ${SHORTS_SUBTITLE_FONTS_DIR:-}
      SHORTS_SUBTITLE_FONT_SIZE: ${SHORTS_SUBTITLE_FONT_SIZE:-70}
      SHORTS_SUBTITLE_MARGIN_V: ${SHORTS_SUBTITLE_MARGIN_V:-220}
      SHORTS_SUBTITLE_MAX_CHARS_PER_LINE: ${SHORTS_SUBTITLE_MAX_CHARS_PER_LINE:-16}
      SHORTS_SUBTITLE_MAX_LINES: ${SHORTS_SUBTITLE_MAX_LINES:-2}
      SHORTS_SUBTITLE_PRIMARY_COLOR: "${SHORTS_SUBTITLE_PRIMARY_COLOR:-&H00FFFFFF}"
      SHORTS_SUBTITLE_HIGHLIGHT_ENABLED: ${SHORTS_SUBTITLE_HIGHLIGHT_ENABLED:-true}
      SHORTS_SUBTITLE_HIGHLIGHT_COLOR: "${SHORTS_SUBTITLE_HIGHLIGHT_COLOR:-&H0000E6FF}"
      SHORTS_SUBTITLE_OUTLINE: ${SHORTS_SUBTITLE_OUTLINE:-5}
      SHORTS_SUBTITLE_SHADOW: ${SHORTS_SUBTITLE_SHADOW:-2}
      BURNED_IN_CAPTION_DETECTION_ENABLED: ${BURNED_IN_CAPTION_DETECTION_ENABLED:-true}
      BURNED_IN_CAPTION_DETECTION_MAX_FRAMES: ${BURNED_IN_CAPTION_DETECTION_MAX_FRAMES:-6}
      BURNED_IN_CAPTION_DETECTION_CONFIDENCE_THRESHOLD: ${BURNED_IN_CAPTION_DETECTION_CONFIDENCE_THRESHOLD:-0.72}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN:-}
      YOUTUBE_OAUTH_REDIRECT_URI: ${YOUTUBE_OAUTH_REDIRECT_URI:-http://127.0.0.1:8010/api/youtube/oauth/callback}
      AUTH_OAUTH_REDIRECT_URI: ${AUTH_OAUTH_REDIRECT_URI:-http://127.0.0.1:8010/api/auth/google/callback}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-long-random-string}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sid}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      YOUTUBE_CATEGORY_ID: ${YOUTUBE_CATEGORY_ID:-24}
      YOUTUBE_DEFAULT_PRIVACY_STATUS: ${YOUTUBE_DEFAULT_PRIVACY_STATUS:-public}
      YOUTUBE_UPLOAD_TIMEOUT_SECONDS: ${YOUTUBE_UPLOAD_TIMEOUT_SECONDS:-600}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}
    ports:
      - "8010:8010"
    volumes:
      - api-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shorts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shorts}
      POSTGRES_DB: ${POSTGRES_DB:-shorts}
    ports:
      # Exposed so local `uvicorn` can share the same database as the container.
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shorts} -d ${POSTGRES_DB:-shorts}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# The web frontend runs outside Docker (e.g. `npm run dev` in apps/web). Only the
# api and postgres run in Docker here.

volumes:
  api-data:
  postgres-data:
