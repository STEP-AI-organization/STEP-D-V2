<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>STEP D Lab</title>
<style>
  :root {
    --bg: #0b0b0d; --panel: #16161a; --panel2: #1e1e24; --border: #2a2a32;
    --text: #e6e6ea; --mut: #9a9aa6; --mut2: #6b6b76;
    --accent: #6ea8fe; --good: #4ade80; --warn: #fbbf24;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "Malgun Gothic", "Segoe UI", sans-serif; }
  a { color: var(--accent); }
  header { padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; position: sticky; top: 0;
    background: rgba(11,11,13,.9); backdrop-filter: blur(8px); z-index: 10; }
  header h1 { font-size: 15px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  header .vid { color: var(--mut); font-size: 13px; }
  .stats { display: flex; gap: 18px; margin-left: auto; font-size: 12px; }
  .stats b { color: var(--text); font-size: 14px; } .stats span { color: var(--mut); }
  .wrap { display: grid; grid-template-columns: 480px 1fr; gap: 0; height: calc(100vh - 55px); }
  .left { border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
  video { width: 100%; border-radius: 10px; background: #000; }
  .now { margin-top: 10px; padding: 10px 12px; background: var(--panel); border-radius: 8px;
    border: 1px solid var(--border); min-height: 44px; font-size: 13px; }
  .now .t { color: var(--mut2); font-size: 11px; }
  .right { overflow-y: auto; }
  .tabs { display: flex; gap: 4px; padding: 12px 16px 0; position: sticky; top: 0;
    background: var(--bg); border-bottom: 1px solid var(--border); z-index: 5; }
  .tab { padding: 8px 14px; border-radius: 8px 8px 0 0; cursor: pointer; color: var(--mut);
    font-size: 13px; border: 1px solid transparent; border-bottom: none; }
  .tab.on { background: var(--panel); color: var(--text); border-color: var(--border); }
  .pane { padding: 16px; display: none; } .pane.on { display: block; }

  /* Scene grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .scene { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer; transition: border-color .12s, transform .12s; }
  .scene:hover { border-color: var(--accent); transform: translateY(-2px); }
  .scene img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background:#000; }
  .scene .meta { padding: 8px 10px; }
  .scene .tr { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--mut2); }
  .scene .badge { font-size: 10px; padding: 1px 6px; border-radius: 20px; }
  .scene .badge.silent { background: #3a2a10; color: var(--warn); }
  .scene .badge.talk { background: #10261a; color: var(--good); }
  .scene .dlg { margin-top: 5px; font-size: 12px; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 34px; }
  .scene .dlg.empty { color: var(--mut2); font-style: italic; }

  /* Transcript */
  .toolbar { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
  .toolbar button { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: 12px; }
  .toolbar button.on { background: var(--accent); color: #08111f; border-color: var(--accent); }
  .seg { display: flex; gap: 10px; padding: 6px 8px; border-radius: 7px; cursor: pointer; }
  .seg:hover { background: var(--panel); }
  .seg .ts { color: var(--mut2); font-size: 11px; min-width: 46px; padding-top: 2px; font-variant-numeric: tabular-nums; }
  .seg.diff { border-left: 2px solid var(--accent); }
  .empty-note { color: var(--mut2); padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>STEP D Lab</h1>
  <span class="vid" id="vidname">—</span>
  <div class="stats" id="stats"></div>
</header>

<div class="wrap">
  <div class="left">
    <video id="player" controls></video>
    <div class="now" id="now"><span class="t">현재 자막</span><div id="nowtext">—</div></div>
  </div>
  <div class="right">
    <div class="tabs">
      <div class="tab on" data-p="scenes">장면 <span id="cnt-scenes"></span></div>
      <div class="tab" data-p="script">자막 <span id="cnt-script"></span></div>
    </div>
    <div class="pane on" id="pane-scenes"><div class="grid" id="grid"></div></div>
    <div class="pane" id="pane-script">
      <div class="toolbar">
        <button id="btn-refined" class="on">정제</button>
        <button id="btn-raw">원본</button>
        <button id="btn-diff">바뀐 것만</button>
      </div>
      <div id="script"></div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
let DATA = null, mode = 'refined', diffOnly = false;

// Same-origin API (served by apps/server locally; via Vercel rewrite when admin
// deploys separately). Override with ?api=http://localhost:4100 for cross-origin dev.
const API = new URLSearchParams(location.search).get('api') || '';

async function load() {
  DATA = await (await fetch(API + '/api/lab/data')).json();
  if (!DATA.video) { $('#grid').innerHTML = '<div class="empty-note">core/ 에 파이프라인 출력이 없습니다. 먼저 pipeline / scenes 를 돌리세요.</div>'; return; }
  $('#player').src = API + DATA.video;
  $('#vidname').textContent = DATA.video_name || '';
  const st = DATA.stats;
  $('#stats').innerHTML = `
    <div><b>${st.duration ? fmt(st.duration) : '—'}</b> <span>길이</span></div>
    <div><b>${st.scenes}</b> <span>장면</span></div>
    <div><b>${st.scenes_silent}</b> <span>무음</span></div>
    <div><b>${st.segments}</b> <span>자막</span></div>`;
  $('#cnt-scenes').textContent = `(${st.scenes})`;
  $('#cnt-script').textContent = `(${st.refined || st.segments})`;
  renderScenes(); renderScript();
  trackNow();
}

function seek(t) { const p = $('#player'); p.currentTime = t + 0.05; p.play(); }

function renderScenes() {
  const frameUrl = f => API + '/api/lab/frames/' + f.split('/').pop();
  $('#grid').innerHTML = DATA.scenes.map(s => `
    <div class="scene" onclick="seek(${s.start})">
      ${s.frame ? `<img loading="lazy" src="${frameUrl(s.frame)}" alt="">` : '<div style="aspect-ratio:16/9;background:#000"></div>'}
      <div class="meta">
        <div class="tr">
          <span>${fmt(s.start)}–${fmt(s.end)} · ${s.duration.toFixed(1)}s</span>
          <span class="badge ${s.has_dialogue ? 'talk' : 'silent'}">${s.has_dialogue ? '대사' : '무음'}</span>
        </div>
        <div class="dlg ${s.text ? '' : 'empty'}">${s.text || '(대사 없음 — 화면으로 판단)'}</div>
      </div>
    </div>`).join('');
}

function renderScript() {
  const raw = DATA.raw, ref = DATA.refined;
  const use = mode === 'refined' && ref.length ? ref : raw;
  const rows = use.map((s, i) => {
    const changed = ref.length && raw[i] && (raw[i].text||'').trim() !== (ref[i]?.text||'').trim();
    if (diffOnly && !changed) return '';
    const txt = (s.text || '').trim();
    if (!txt) return '';
    return `<div class="seg ${changed ? 'diff' : ''}" onclick="seek(${s.start})">
      <span class="ts">${fmt(s.start)}</span><span>${txt}</span></div>`;
  }).join('');
  $('#script').innerHTML = rows || '<div class="empty-note">표시할 자막이 없습니다.</div>';
}

function trackNow() {
  const p = $('#player');
  p.addEventListener('timeupdate', () => {
    const t = p.currentTime, src = DATA.refined.length ? DATA.refined : DATA.raw;
    const cur = src.find(s => s.start <= t && s.end >= t);
    $('#nowtext').textContent = cur && cur.text ? cur.text : '—';
  });
}

// tabs
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(x => x.classList.remove('on'));
  t.classList.add('on'); $('#pane-' + t.dataset.p).classList.add('on');
});
// transcript toggles
$('#btn-refined').onclick = () => { mode='refined'; diffOnly=false; toggles(); };
$('#btn-raw').onclick = () => { mode='raw'; diffOnly=false; toggles(); };
$('#btn-diff').onclick = () => { diffOnly=!diffOnly; toggles(); };
function toggles() {
  $('#btn-refined').classList.toggle('on', mode==='refined' && !diffOnly);
  $('#btn-raw').classList.toggle('on', mode==='raw' && !diffOnly);
  $('#btn-diff').classList.toggle('on', diffOnly);
  renderScript();
}

load();
</script>
</body>
</html>
